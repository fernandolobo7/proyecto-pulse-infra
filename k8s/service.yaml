apiVersion: v1
kind: Service
metadata:
  name: pulse-python-service
  annotations:
    # 1. Usar NLB moderno
    service.beta.kubernetes.io/aws-load-balancer-type: "external"
    service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: "ip"
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
    # 2. CONFIGURACIÓN DE SALUD (Crucial)
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-port: "8080"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-path: "/metrics"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-protocol: "HTTP"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-interval: "10"
spec:
  type: LoadBalancer
  selector:
    app: pulse-python-app # Asegúrate que tu Deployment use exactamente este label
  ports:
    - protocol: TCP
      port: 80         
      targetPort: 8080